<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shepu Juice - Product Detail</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;color:#222;margin:0;}
.container{width:90%;margin:auto;}
header{background:#0a7f5a;color:white;padding:15px 0;}
.nav-container{display:flex;flex-direction:column;align-items:center;}
.logo{font-size:24px;font-weight:bold;}
nav ul{list-style:none;margin-top:10px;}
nav ul li{margin:5px 0;}
nav a{text-decoration:none;color:white;transition:0.3s;}
nav a:hover{color:#ffb703;}
.product-detail{background:white;padding:30px;margin:30px 0;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.08);}
.product-detail img{width:100%;border-radius:10px;margin-bottom:20px;}
.product-detail button{padding:12px 25px;border:none;border-radius:30px;background:#ffb703;color:#0a7f5a;font-weight:bold;cursor:pointer;transition:0.3s;margin-right:10px;}
.product-detail button:hover{background:white;transform:scale(1.05);}
@media(min-width:769px){.nav-container{flex-direction:row;justify-content:space-between;} nav ul{display:flex;gap:20px;margin-top:0;}}
</style>
</head>
<body>
<header>
<div class="container nav-container">
  <div class="logo">🍹 Shepu Juice</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="signup.html">Sign Up</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="account.html">Account</a></li>
    </ul>
  </nav>
</div>
</header>

<div class="container">
  <div class="product-detail" id="product-detail"></div>
</div>

<script>
const product = JSON.parse(localStorage.getItem('detail'));
const div = document.getElementById('product-detail');
div.innerHTML = `
  <img src="${product.img}" alt="${product.name}">
  <h2>${product.name}</h2>
  <p>Price: $${product.price.toFixed(2)}</p>
  <button onclick="addToCart()">Add to Cart</button>
  <button onclick="goBack()">Back to Products</button>
`;

function addToCart(){
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const existing = cart.find(item=>item.id===product.id);
  if(existing){ existing.qty += 1; } else { cart.push({...product, qty:1}); }
  localStorage.setItem('cart', JSON.stringify(cart));
  alert(product.name+" added to cart!");
}

function goBack(){
  location.href='products.html';
}
</script>
</body>
</html>
