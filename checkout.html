<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shepu Juice - Checkout</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;color:#222;}
.container{width:90%;margin:auto;}
header{background:#0a7f5a;color:white;padding:15px 0;}
.nav-container{display:flex;flex-direction:column;align-items:center;}
.logo{font-size:24px;font-weight:bold;}
nav ul{list-style:none;margin-top:10px;}
nav ul li{margin:5px 0;}
nav a{text-decoration:none;color:white;transition:0.3s;}
nav a:hover{color:#ffb703;}
form, .cart-summary{background:white;padding:25px;margin:20px 0;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.08);}
input, select{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
button{padding:12px 25px;border:none;border-radius:30px;background:#0a7f5a;color:white;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover{background:#065f45;}
.cart-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #ccc;}
@media(min-width:769px){.nav-container{flex-direction:row;justify-content:space-between;} nav ul{display:flex;gap:20px;margin-top:0;}}
</style>
</head>
<body>
<header>
<div class="container nav-container">
  <div class="logo">🍹 Shepu Juice</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="signup.html">Sign Up</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="account.html">Account</a></li>
    </ul>
  </nav>
</div>
</header>

<div class="container">
<h2>Checkout</h2>
<div class="cart-summary" id="cart-summary"></div>

<form id="checkout-form">
  <h3>Shipping & Payment Info</h3>
  <input type="text" placeholder="Full Name" id="name" required>
  <input type="email" placeholder="Email Address" id="email" required>
  <input type="text" placeholder="Shipping Address" id="address" required>
  <select id="payment" required>
    <option value="">Select Payment Method</option>
    <option>Cash on Delivery</option>
    <option>GCash</option>
    <option>Credit Card</option>
  </select>
  <button type="submit">Place Order</button>
</form>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('cart') || '[]');
const cartSummary = document.getElementById('cart-summary');

function renderCartSummary(){
  cartSummary.innerHTML='';
  let total=0;
  cart.forEach(item=>{
    total+=item.price*item.qty;
    const div=document.createElement('div');
    div.className='cart-item';
    div.innerHTML=`<span>${item.name} x ${item.qty}</span><span>$${(item.price*item.qty).toFixed(2)}</span>`;
    cartSummary.appendChild(div);
  });
  const totalDiv=document.createElement('div');
  totalDiv.className='cart-item';
  totalDiv.style.fontWeight='bold';
  totalDiv.innerHTML=`<span>Total</span><span>$${total.toFixed(2)}</span>`;
  cartSummary.appendChild(totalDiv);
}
renderCartSummary();

document.getElementById('checkout-form').addEventListener('submit',function(e){
  e.preventDefault();
  alert('Thank you for your order!');
  localStorage.removeItem('cart');
  location.href='index.html';
});
</script>
</body>
</html>
