<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shepu Juice - Cart</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;color:#222;margin:0;}
.container{width:90%;margin:auto;}
header{background:#0a7f5a;color:white;padding:15px 0;}
.nav-container{display:flex;flex-direction:column;align-items:center;}
.logo{font-size:24px;font-weight:bold;}
nav ul{list-style:none;margin-top:10px;}
nav ul li{margin:5px 0;}
nav a{text-decoration:none;color:white;transition:0.3s;}
nav a:hover{color:#ffb703;}
.cart-item{background:white;margin:20px 0;padding:20px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:space-between;}
.cart-item img{width:100px;border-radius:10px;}
.cart-item div{flex:1;margin-left:20px;}
.cart-item button{padding:8px 15px;border:none;border-radius:25px;background:#ffb703;color:#0a7f5a;font-weight:bold;cursor:pointer;transition:0.3s;margin-left:5px;}
.cart-item button:hover{background:white;transform:scale(1.05);}
.total{background:white;padding:20px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.08);margin-top:20px;text-align:right;}
.checkout-btn{padding:12px 25px;border:none;border-radius:30px;background:#0a7f5a;color:white;font-weight:bold;cursor:pointer;transition:0.3s;}
.checkout-btn:hover{background:#065f45;}
@media(min-width:769px){.nav-container{flex-direction:row;justify-content:space-between;} nav ul{display:flex;gap:20px;margin-top:0;}}
</style>
</head>
<body>
<header>
<div class="container nav-container">
  <div class="logo">🍹 Shepu Juice</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="signup.html">Sign Up</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="account.html">Account</a></li>
    </ul>
  </nav>
</div>
</header>

<div class="container" id="cart-container"></div>

<script>
let cart = JSON.parse(localStorage.getItem('cart') || '[]');
const container = document.getElementById('cart-container');

function renderCart(){
  container.innerHTML='';
  let totalPrice=0;
  cart.forEach((item,index)=>{
    totalPrice += item.price*item.qty;
    const div=document.createElement('div');
    div.className='cart-item';
    div.innerHTML=`
      <img src="${item.img}" alt="${item.name}">
      <div>
        <h3>${item.name}</h3>
        <p>Price: $${item.price.toFixed(2)}</p>
        <p>Quantity: ${item.qty}</p>
      </div>
      <div>
        <button onclick="removeItem(${index})">Remove</button>
      </div>
    `;
    container.appendChild(div);
  });
  if(cart.length>0){
    const totalDiv=document.createElement('div');
    totalDiv.className='total';
    totalDiv.innerHTML=`<h3>Total: $${totalPrice.toFixed(2)}</h3>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>`;
    container.appendChild(totalDiv);
  } else {
    container.innerHTML='<h3>Your cart is empty.</h3>';
  }
}
renderCart();

function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem('cart',JSON.stringify(cart));
  renderCart();
}

function checkout(){
  location.href='checkout.html';
}
</script>
</body>
</html>
