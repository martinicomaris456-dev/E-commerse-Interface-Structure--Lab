<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shepu Juice - Products</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f4f4f4;color:#222;}
.container{width:90%;margin:auto;}
header{background:#0a7f5a;color:white;padding:15px 0;}
.nav-container{display:flex;flex-direction:column;align-items:center;}
.logo{font-size:24px;font-weight:bold;}
nav ul{list-style:none;margin-top:10px;}
nav ul li{margin:5px 0;}
nav a{text-decoration:none;color:white;transition:0.3s;}
nav a:hover{color:#ffb703;}
.products{display:grid;gap:20px;padding:40px 0;}
.product-card{background:white;padding:20px;border-radius:15px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,0.08);}
.product-card img{width:100%;border-radius:10px;}
.product-card button{padding:10px 20px;border:none;border-radius:30px;background:#ffb703;color:#0a7f5a;font-weight:bold;cursor:pointer;margin-top:10px;transition:0.3s;}
.product-card button:hover{background:white;transform:scale(1.05);}
@media(min-width:769px){.nav-container{flex-direction:row;justify-content:space-between;} nav ul{display:flex;gap:20px;margin-top:0;} .products{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<header>
<div class="container nav-container">
  <div class="logo">🍹 Shepu Juice</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="signup.html">Sign Up</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="account.html">Account</a></li>
    </ul>
  </nav>
</div>
</header>

<div class="container products" id="product-list">
  <!-- Products will load here via JS -->
</div>

<script>
// Example products
const products = [
  {id:1,name:"Orange Juice",price:3.5,img:"https://images.unsplash.com/photo-1572441710534-680f2fbc1f75?auto=format&fit=crop&w=600&q=80"},
  {id:2,name:"Apple Juice",price:4.0,img:"https://images.unsplash.com/photo-1584306670284-9cbbd539b9db?auto=format&fit=crop&w=600&q=80"},
  {id:3,name:"Mango Juice",price:4.5,img:"https://images.unsplash.com/photo-1590080870160-4f4730ef9294?auto=format&fit=crop&w=600&q=80"}
];

// Render products
const productList = document.getElementById('product-list');
products.forEach(product=>{
  const div = document.createElement('div');
  div.className='product-card';
  div.innerHTML = `
    <img src="${product.img}" alt="${product.name}">
    <h3>${product.name}</h3>
    <p>$${product.price.toFixed(2)}</p>
    <button onclick="viewDetail(${product.id})">View</button>
    <button onclick="addToCart(${product.id})">Add to Cart</button>
  `;
  productList.appendChild(div);
});

// Add to cart
function addToCart(id){
  const product = products.find(p=>p.id===id);
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const existing = cart.find(item=>item.id===id);
  if(existing){ existing.qty += 1; } else { cart.push({...product, qty:1}); }
  localStorage.setItem('cart', JSON.stringify(cart));
  alert(product.name+" added to cart!");
}

// View product details
function viewDetail(id){
  localStorage.setItem('detail', JSON.stringify(products.find(p=>p.id===id)));
  location.href='detail.html';
}
</script>
</body>
</html>
